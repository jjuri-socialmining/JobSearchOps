name: JobSearchOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

# Required secrets (set in GitHub → Settings → Secrets → Actions):
# ADZUNA_APP_ID, ADZUNA_APP_KEY, ANTHROPIC_API_KEY

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint

  qc-gate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: |
          if [ -f tmp/jobops-pipeline/opportunity-inventory.json ]; then
            node scripts/jobops-qc-gate.mjs --report-only
          else
            echo "No inventory file found — skipping QC gate (run capture first)"
            exit 0
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: qc-report
          path: tmp/qc-report.json
          retention-days: 7

  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: qc-gate
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Generate dashboard
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -f tmp/jobops-pipeline/opportunity-inventory.json ]; then
            node scripts/jobops-export-dashboard.mjs
          else
            echo "No inventory — copying placeholder dashboard"
          fi
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./tmp/jobops-pipeline
          publish_branch: gh-pages
          destination_dir: dashboard

  capture:
    runs-on: ubuntu-latest
    needs: qc-gate
    if: github.event_name == 'schedule'
    env:
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run capture
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: automated capture run'
          file_pattern: 'tmp/**'
