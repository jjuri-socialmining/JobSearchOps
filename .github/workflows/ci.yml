name: JobSearchOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1-5'

# Required secrets (set in GitHub → Settings → Secrets → Actions):
# ADZUNA_APP_ID, ADZUNA_APP_KEY, ANTHROPIC_API_KEY

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - run: npm run lint

  qc-gate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - run: node scripts/jobops-qc-gate.mjs --report-only
      - uses: actions/upload-artifact@v4
        with:
          name: qc-report
          path: tmp/qc-report.json
          retention-days: 7

  capture:
    runs-on: ubuntu-latest
    needs: qc-gate
    if: github.event_name == 'schedule'
    env:
      ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
      ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - run: npm run capture
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: automated capture run'
          file_pattern: 'tmp/**'
