version: 1
capture:
  sources_config: "config/sources.yaml"
  output_file: "tmp/jobops-pipeline/latest-capture.json"
  enabled_sources_only: true
enrich:
  mode: "heuristic"
  ai_optional: true
  output_file: "tmp/jobops-pipeline/latest-enriched.json"
score:
  scoring_config: "config/scoring.yaml"
  output_file: "tmp/jobops-pipeline/latest-scored.json"
store:
  sheets:
    enabled: false
    output_file: "tmp/jobops-pipeline/latest-sheets-payload.json"
  obsidian:
    enabled: true
    output_file: "tmp/jobops-pipeline/latest-jobs.md"
decision:
  allowed_statuses:
    - "APLICAR"
    - "SOLO SI ACLARAN X"
    - "DESCARTAR"

handoff:
  joboffersops:
    enabled: true
    output_file: "../JobOffersOps/intake/opportunity-inventory.json"
    blacklist_file: "../JobOffersOps/intake/company-blacklist.json"
    qc_decisions_file: "../shared/training/qc-decisions.json"
    schema: "opportunity-inventory.v1"
    profile_id: "jorgejuri"
    only_on_qc_approved: true
